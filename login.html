<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Quantity Measurement App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0b0f1a;
            --indigo-glow: rgba(99, 102, 241, 0.12);
            --purple-glow: rgba(139, 92, 246, 0.08);
            --primary: #6366f1;
            --primary-accent: #8b5cf6;
            --text-main: #ffffff;
            --text-sub: #cbd5e1;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.12);
        }

        .light-mode {
            --bg-deep: #f5f7ff;
            --indigo-glow: rgba(99, 102, 241, 0.08);
            --purple-glow: rgba(139, 92, 246, 0.05);
            --text-main: #0f172a;
            --text-sub: #475569;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(99, 102, 241, 0.15);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
            transition: background 0.6s cubic-bezier(0.4, 0, 0.2, 1), color 0.6s ease;
        }

        .gradient-bg {
            position: relative;
            background: var(--bg-deep);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .gradient-bg::before {
            content: "";
            position: fixed;
            top: -10%;
            left: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, var(--indigo-glow) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
            transition: background 0.6s ease;
        }

        .gradient-bg::after {
            content: "";
            position: fixed;
            bottom: -10%;
            right: -10%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, var(--purple-glow) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
            transition: background 0.6s ease;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body:not(.light-mode) .glass {
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            color: var(--text-main);
        }

        .light-mode .input-field {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        .input-field.error {
            border-color: #f87171 !important;
            box-shadow: 0 0 10px rgba(248, 113, 113, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(99, 102, 241, 0.5);
            filter: brightness(1.1);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-google {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(255, 255, 255, 1);
            color: #1f2937;
            transition: all 0.3s ease;
        }

        .btn-google:hover {
            background: #ffffff;
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .logo-glow {
            filter: drop-shadow(0 0 8px rgba(99, 102, 241, 0.6));
        }

        /* Toast notification */
        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            z-index: 9999;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            backdrop-filter: blur(16px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            opacity: 0;
            pointer-events: none;
            white-space: nowrap;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        #toast.success {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }

        #toast.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }
    </style>
</head>

<body class="gradient-bg">

    <!-- Toast -->
    <div id="toast"></div>

    <!-- Header Navigation -->
    <header class="fixed top-0 w-full z-50 px-6 py-6 flex justify-between items-center max-w-6xl">
        <a href="index.html" class="flex items-center space-x-3 group cursor-pointer">
            <div
                class="p-1.5 rounded-xl bg-indigo-500/20 border border-indigo-500/30 logo-glow transition-transform group-hover:scale-110">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 12h20"></path>
                    <path d="M7 12v-3"></path>
                    <path d="M12 12v-5"></path>
                    <path d="M17 12v-3"></path>
                    <path d="M2 12v5a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-5"></path>
                </svg>
            </div>
            <span
                class="font-bold text-xl tracking-tight text-white transition-colors group-hover:text-indigo-500">QMA</span>
        </a>

        <div class="flex items-center space-x-6">
            <button id="themeToggle" class="text-slate-400 hover:text-indigo-500 transition-all"
                aria-label="Toggle Theme">
                <svg id="sunIcon" class="hidden w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M16.95 16.95l.707.707M7.05 7.05l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
                </svg>
                <svg id="moonIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
                </svg>
            </button>
            <a href="index.html" class="text-sm font-semibold opacity-70 hover:opacity-100 transition-opacity">Back to
                Home</a>
        </div>
    </header>

    <!-- Login Card -->
    <main class="relative z-10 w-full px-6 flex justify-center items-center">
        <div class="glass w-full max-w-md p-8 rounded-2xl relative overflow-hidden">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-extrabold mb-2 tracking-tight">Welcome Back</h2>
                <p class="text-sm opacity-70" style="color: var(--text-sub);">Please enter your details to sign in</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
                <div class="flex flex-col gap-4">

                    <!-- Username/Email Input -->
                    <!-- NOTE: The field name sent to Spring is "username".
                         Your LoginRequestDto should have a "username" field.
                         If your DTO uses "email" instead, change requestBody below accordingly. -->
                    <div class="relative group">
                        <div
                            class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-indigo-400 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.206" />
                            </svg>
                        </div>
                        <input type="text" id="username" required placeholder="Username or Email"
                            class="input-field w-full pl-12 pr-4 py-3 rounded-xl text-sm font-medium">
                    </div>

                    <!-- Password Input -->
                    <div class="relative group">
                        <div
                            class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-indigo-400 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <input type="password" id="password" required placeholder="Password"
                            class="input-field w-full pl-12 pr-4 py-3 rounded-xl text-sm font-medium">
                    </div>
                </div>

                <!-- Remember me + Forgot password -->
                <div class="flex items-center justify-between text-xs font-medium px-1 mt-4">
                    <label
                        class="flex items-center space-x-2 cursor-pointer opacity-70 hover:opacity-100 transition-opacity">
                        <input type="checkbox" id="rememberMe"
                            class="w-4 h-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500 bg-transparent">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="text-indigo-400 hover:text-indigo-300 transition-colors">Forgot Password?</a>
                </div>

                <!-- Login Button -->
                <button type="submit" id="loginBtn"
                    class="btn-primary w-full py-3 rounded-xl text-white font-bold text-sm tracking-wide mt-[1.2rem]">
                    Login
                </button>
            </form>

            <!-- Divider -->
            <div class="flex items-center my-6">
                <div class="flex-grow border-t border-white/10"></div>
                <span class="px-3 text-[10px] font-bold tracking-widest text-slate-500 uppercase">OR</span>
                <div class="flex-grow border-t border-white/10"></div>
            </div>

            <!-- Google Login -->
            <button onclick="handleGoogleLogin()"
                class="btn-google w-full py-3 rounded-xl flex items-center justify-center space-x-3 text-sm font-bold shadow-sm">
                <svg width="18" height="18" viewBox="0 0 48 48">
                    <path fill="#EA4335"
                        d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                    <path fill="#4285F4"
                        d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                    <path fill="#FBBC05"
                        d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                    <path fill="#34A853"
                        d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                </svg>
                <span>Continue with Google</span>
            </button>

            <!-- Bottom Note -->
            <p class="text-center mt-6 text-xs font-medium opacity-60">
                Don't have an account? <a href="signup.html" class="text-indigo-400 font-bold hover:underline">Sign up
                    for free</a>
            </p>
        </div>
    </main>

    <footer class="py-12 text-center relative z-10 opacity-50">
        <p class="text-[10px] font-bold tracking-[0.3em] uppercase">
            &copy; 2024 Quantity Measurement App &bull; Secure Authentication
        </p>
    </footer>

    <script>
        // ─── CONFIG ───────────────────────────────────────────────────────────────────
        //const BASE_URL = "http://localhost:8080";
        const BASE_URL = "https://demoquantity-1.onrender.com";
        const params = new URLSearchParams(window.location.search);
        const tokenFromUrl = params.get("token");

        if (tokenFromUrl) {
            localStorage.setItem("qma_token", tokenFromUrl);

            console.log("OAuth login success");

            showToast("Login successful! Redirecting...", "success");

            
            window.history.replaceState({}, document.title, "/index.html");


            setTimeout(() => {
                window.location.href = "index.html";
            }, 1500); // 1.5 sec delay
        }

        // ─── THEME TOGGLE ─────────────────────────────────────────────────────────────
        document.getElementById('themeToggle').addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            document.getElementById('sunIcon').classList.toggle('hidden', !isLight);
            document.getElementById('moonIcon').classList.toggle('hidden', isLight);
        });

        // ─── TOAST HELPER ─────────────────────────────────────────────────────────────
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `show ${type}`;
            setTimeout(() => { toast.className = ''; }, 3500);
        }

        // ─── INPUT ERROR HIGHLIGHT ────────────────────────────────────────────────────
        function setError(fieldId, hasError) {
            document.getElementById(fieldId).classList.toggle('error', hasError);
        }

        // ─── REMEMBER ME: pre-fill username on load ───────────────────────────────────
        window.addEventListener('load', () => {
            const saved = localStorage.getItem('qma_remembered_user');
            if (saved) {
                document.getElementById('username').value = saved;
                document.getElementById('rememberMe').checked = true;
            }
        });

        // ─── LOGIN → POST /auth/login ─────────────────────────────────────────────────
        async function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('rememberMe').checked;

            // Client-side validation
            let valid = true;
            if (!username) { setError('username', true); valid = false; }
            else setError('username', false);
            if (!password) { setError('password', true); valid = false; }
            else setError('password', false);
            if (!valid) { showToast('Please fill in all fields.', 'error'); return; }

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = 'Signing in...';

            try {
                // Matches LoginRequestDto — adjust field names if your DTO differs
                // e.g. if your DTO has "email" instead of "username", change it here

                const requestBody = {
                    username: username,
                    password: password
                };

                console.log('[QMA] POST /auth/login', { username });

                const response = await fetch(`${BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    let errMsg = `Login failed (${response.status})`;
                    try {
                        const errBody = await response.json();
                        if (errBody.message) errMsg = errBody.message;
                        else if (errBody.error) errMsg = errBody.error;
                    } catch (_) { }
                    throw new Error(errMsg);
                }

                // LoginResponseDto — commonly contains a JWT token
                // Adjust field names to match what your LoginResponseDto actually returns
                const result = await response.json();
                console.log('[QMA] Login response:', result);

                // ── Persist auth token if your backend returns one ────────────────
                // Common field names: token, accessToken, jwt — adjust as needed
                const token = result.token ?? result.accessToken ?? result.jwt ?? null;
                if (token) {
                    localStorage.setItem('qma_token', token);
                }

                // ── Remember me ───────────────────────────────────────────────────
                if (remember) {
                    localStorage.setItem('qma_remembered_user', username);
                } else {
                    localStorage.removeItem('qma_remembered_user');
                }

                showToast('Login successful! Redirecting...', 'success');

                // Redirect to dashboard after short delay
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);

            } catch (error) {
                console.error('[QMA] Login error:', error);
                showToast(error.message, 'error');
                btn.disabled = false;
                btn.textContent = 'Login';
            }
        }

        // ─── GOOGLE LOGIN → Spring Security OAuth2 ───────────────────────────────────
        function handleGoogleLogin() {
            window.location.href = `${BASE_URL}/oauth2/authorization/google`;
        }
    </script>
</body>

</html>
