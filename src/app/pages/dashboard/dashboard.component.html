<div class="dash-layout">

  <!-- Mobile overlay -->
  <div class="sidebar-overlay" [class.active]="sidebarOpen" (click)="closeSidebar()"></div>

  <!-- ── SIDEBAR ───────────────────────────────── -->
  <aside class="sidebar" [class.open]="sidebarOpen">
    <div class="sidebar-inner">

      <!-- Logo -->
      <div class="sidebar-logo">
        <div class="qma-logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 12h20"/><path d="M7 12v-3"/><path d="M12 12v-5"/><path d="M17 12v-3"/>
            <path d="M2 12v5a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-5"/>
          </svg>
        </div>
        <span class="sidebar-brand">QMA</span>
      </div>

      <!-- Nav -->
      <nav class="sidebar-nav">
        <a class="sidebar-link active" href="#">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a class="sidebar-link" href="#">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
          Convert
        </a>
        <a class="sidebar-link" href="#">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          History
        </a>
      </nav>

      <!-- Logout -->
      <button class="sidebar-logout" (click)="logout()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>

    </div>
  </aside>

  <!-- ── MAIN ──────────────────────────────────── -->
  <div class="dash-main">

    <!-- Top bar -->
    <header class="dash-topbar">
      <div class="topbar-left">
        <!-- Hamburger (mobile) -->
        <button class="hamburger" (click)="toggleSidebar()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="topbar-title">Dashboard</span>
      </div>

      <div class="topbar-right">
        <div class="user-chip">
          <div class="user-info">
            <span class="user-name">{{ displayUsername }}</span>
            <span class="user-role">Premium User</span>
          </div>
          <div class="user-avatar">{{ avatarLetter }}</div>
        </div>
      </div>
    </header>

    <!-- Body -->
    <main class="dash-body">

      <!-- ── MEASUREMENT PANEL ──────────────────── -->
      <section class="panel">
        <div class="panel-head">
          <div class="panel-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
          </div>
          <h2 class="panel-title">Measurement Panel</h2>
        </div>

        <!-- Row 1: Type + Operation -->
        <div class="form-grid-2">

          <div class="field">
            <label class="qma-label">Measurement Type</label>
            <div class="dd-container">
              <button class="dd-trigger" (click)="toggleDD('type', $event)">
                <span>{{ measurementType }}</span>
                <svg class="dd-chevron" [class.rotated]="openDropdown==='type'" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
              <div class="dd-menu" [class.open]="openDropdown==='type'">
                <button *ngFor="let t of ['Length','Weight','Volume','Temperature']"
                  class="dd-item" [class.selected]="measurementType===t"
                  (click)="selectMeasurementType(t)">{{ t }}</button>
              </div>
            </div>
          </div>

          <div class="field">
            <label class="qma-label">Operation</label>
            <div class="dd-container">
              <button class="dd-trigger" (click)="toggleDD('op', $event)">
                <span>{{ operationType }}</span>
                <svg class="dd-chevron" [class.rotated]="openDropdown==='op'" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
              <div class="dd-menu" [class.open]="openDropdown==='op'">
                <button *ngFor="let o of availableOps"
                  class="dd-item" [class.selected]="operationType===o"
                  (click)="selectOperation(o)">{{ o }}</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Row 2: Values & Units -->
        <div class="form-grid-2 inputs-row">

          <!-- LEFT: values + unit dropdowns -->
          <div class="field">
            <label class="qma-label">Values &amp; Units</label>

            <!-- Value 1 + Unit 1 -->
            <div class="value-row">
              <input type="number" class="dd-trigger num-input" [(ngModel)]="val1" placeholder="Value 1">
              <div class="dd-container unit-dd">
                <button class="dd-trigger" (click)="toggleDD('u1', $event)">
                  <span>{{ unit1 }}</span>
                  <svg class="dd-chevron" [class.rotated]="openDropdown==='u1'" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                </button>
                <div class="dd-menu" [class.open]="openDropdown==='u1'">
                  <button *ngFor="let u of availableUnits" class="dd-item" [class.selected]="unit1===u" (click)="selectUnit1(u)">{{ u }}</button>
                </div>
              </div>
            </div>

            <!-- Value 2 + Unit 2 -->
            <div class="value-row" *ngIf="showVal2" style="margin-top: 10px;">
              <input type="number" class="dd-trigger num-input" [(ngModel)]="val2" placeholder="Value 2">
              <div class="dd-container unit-dd">
                <button class="dd-trigger" (click)="toggleDD('u2', $event)">
                  <span>{{ unit2 }}</span>
                  <svg class="dd-chevron" [class.rotated]="openDropdown==='u2'" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                </button>
                <div class="dd-menu" [class.open]="openDropdown==='u2'">
                  <button *ngFor="let u of availableUnits" class="dd-item" [class.selected]="unit2===u" (click)="selectUnit2(u)">{{ u }}</button>
                </div>
              </div>
            </div>
          </div>

          <!-- RIGHT: target unit -->
          <div class="field" *ngIf="showTarget">
            <label class="qma-label">Target Configuration</label>
            <p class="target-sub">Convert to:</p>
            <div class="dd-container">
              <button class="dd-trigger" (click)="toggleDD('target', $event)">
                <span>{{ targetUnit }}</span>
                <svg class="dd-chevron" [class.rotated]="openDropdown==='target'" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
              <div class="dd-menu" [class.open]="openDropdown==='target'">
                <button *ngFor="let u of availableUnits" class="dd-item" [class.selected]="targetUnit===u" (click)="selectTarget(u)">{{ u }}</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Calculate btn -->
        <div class="panel-footer">
          <button class="qma-btn calc-btn" [disabled]="isCalculating" (click)="calculate()">
            {{ isCalculating ? 'Processing...' : 'Calculate Results' }}
            <svg *ngIf="!isCalculating" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          </button>
        </div>
      </section>

      <!-- ── RESULT ─────────────────────────────── -->
      <section class="result-panel">
        <p class="result-label">Output Result</p>
        <div class="result-value-row">
          <span class="result-number">{{ resultValue }}</span>
          <span class="result-unit">{{ resultUnit }}</span>
        </div>
        <div class="result-badge"
          [class.badge-default]="statusType==='default'"
          [class.badge-success]="statusType==='success'"
          [class.badge-error]="statusType==='error'">
          {{ statusMsg }}
        </div>
      </section>

    </main>

    <footer class="dash-footer">
      <p>&copy; 2024 Quantity Measurement App &nbsp;·&nbsp; Arctic Precision Engine</p>
    </footer>
  </div>

</div>
