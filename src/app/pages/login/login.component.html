<div class="auth-page">

  <!-- Toast -->
  <div class="qma-toast" [class.show]="toast.visible" [class.success]="toast.type==='success'" [class.error]="toast.type==='error'">
    {{ toast.message }}
  </div>

  <!-- Header -->
  <header class="auth-header">
    <div class="qma-logo" (click)="goHome()">
      <div class="qma-logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 12h20"/><path d="M7 12v-3"/><path d="M12 12v-5"/><path d="M17 12v-3"/>
          <path d="M2 12v5a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-5"/>
        </svg>
      </div>
      <span class="qma-logo-text">QMA</span>
    </div>
    <button class="header-back-btn" (click)="goHome()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Back to Home
    </button>
  </header>

  <!-- Card -->
  <div class="auth-card">

    <div class="auth-card-head">
      <div class="auth-card-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <h2 class="auth-title">Welcome back</h2>
      <p class="auth-sub">Sign in to your QMA account</p>
    </div>

    <!-- Google -->
    <button class="qma-btn-google" (click)="handleGoogleLogin()">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Continue with Google
    </button>

    <div class="qma-divider" style="margin: 20px 0;">OR</div>

    <!-- Form -->
    <div class="auth-form">

      <div class="form-group">
        <label class="qma-label">Username or Email</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </span>
          <input type="text" class="qma-input" [class.error]="usernameError" [(ngModel)]="username" placeholder="Enter username or email" (input)="usernameError=false">
        </div>
      </div>

      <div class="form-group">
        <label class="qma-label">Password</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input type="password" class="qma-input" [class.error]="passwordError" [(ngModel)]="password" placeholder="Enter password" (input)="passwordError=false">
        </div>
      </div>

      <div class="form-row">
        <label class="remember-label">
          <input type="checkbox" [(ngModel)]="rememberMe" class="remember-check">
          <span>Remember me</span>
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button class="qma-btn full" [disabled]="isLoading" (click)="handleLogin()">
        <svg *ngIf="!isLoading" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        {{ isLoading ? 'Signing in...' : 'Sign In' }}
      </button>
    </div>

    <p class="auth-footer-text">
      Don't have an account?
      <a (click)="goToSignup()" class="auth-link">Create account</a>
    </p>
  </div>

</div>
