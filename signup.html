<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Quantity Measurement App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0b0f1a;
            --indigo-glow: rgba(99, 102, 241, 0.12);
            --purple-glow: rgba(139, 92, 246, 0.08);
            --primary: #6366f1;
            --primary-accent: #8b5cf6;
            --text-main: #ffffff;
            --text-sub: #cbd5e1;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.12);
        }

        .light-mode {
            --bg-deep: #f5f7ff;
            --indigo-glow: rgba(99, 102, 241, 0.08);
            --purple-glow: rgba(139, 92, 246, 0.05);
            --text-main: #0f172a;
            --text-sub: #475569;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(99, 102, 241, 0.15);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
            transition: background 0.6s cubic-bezier(0.4, 0, 0.2, 1), color 0.6s ease;
        }

        .gradient-bg {
            position: relative;
            background: var(--bg-deep);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .gradient-bg::before {
            content: "";
            position: fixed;
            top: -10%; left: -10%;
            width: 50%; height: 50%;
            background: radial-gradient(circle, var(--indigo-glow) 0%, transparent 70%);
            z-index: 0; pointer-events: none;
            transition: background 0.6s ease;
        }

        .gradient-bg::after {
            content: "";
            position: fixed;
            bottom: -10%; right: -10%;
            width: 60%; height: 60%;
            background: radial-gradient(circle, var(--purple-glow) 0%, transparent 70%);
            z-index: 0; pointer-events: none;
            transition: background 0.6s ease;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body:not(.light-mode) .glass {
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            color: var(--text-main);
        }

        .light-mode .input-field {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        .input-field.error {
            border-color: #f87171 !important;
            box-shadow: 0 0 10px rgba(248, 113, 113, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(99, 102, 241, 0.5);
            filter: brightness(1.1);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-google {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(255, 255, 255, 1);
            color: #1f2937;
            transition: all 0.3s ease;
        }

        .btn-google:hover {
            background: #ffffff;
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .logo-glow {
            filter: drop-shadow(0 0 8px rgba(99, 102, 241, 0.6));
        }

        /* Toast notification */
        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            z-index: 9999;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            backdrop-filter: blur(16px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            opacity: 0;
            pointer-events: none;
            white-space: nowrap;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        #toast.success {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }

        #toast.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }
    </style>
</head>
<body class="gradient-bg">

    <!-- Toast -->
    <div id="toast"></div>

    <!-- Header Navigation -->
    <header class="fixed top-0 w-full z-50 px-6 py-6 flex justify-between items-center max-w-6xl">
        <a href="index.html" class="flex items-center space-x-3 group cursor-pointer">
            <div class="p-1.5 rounded-xl bg-indigo-500/20 border border-indigo-500/30 logo-glow transition-transform group-hover:scale-110">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 12h20"></path>
                    <path d="M7 12v-3"></path>
                    <path d="M12 12v-5"></path>
                    <path d="M17 12v-3"></path>
                    <path d="M2 12v5a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-5"></path>
                </svg>
            </div>
            <span class="font-bold text-xl tracking-tight text-white transition-colors group-hover:text-indigo-500">QMA</span>
        </a>

        <div class="flex items-center space-x-6">
            <button id="themeToggle" class="text-slate-400 hover:text-indigo-500 transition-all" aria-label="Toggle Theme">
                <svg id="sunIcon" class="hidden w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M16.95 16.95l.707.707M7.05 7.05l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
                </svg>
                <svg id="moonIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
                </svg>
            </button>
            <a href="index.html" class="text-sm font-semibold opacity-70 hover:opacity-100 transition-opacity">Back to Home</a>
        </div>
    </header>

    <!-- Signup Card -->
    <main class="relative z-10 w-full px-6 py-20 flex justify-center items-center">
        <div class="glass w-full max-w-md p-8 rounded-2xl relative overflow-hidden">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-extrabold mb-2 tracking-tight">Create Account</h2>
                <p class="text-sm opacity-70" style="color: var(--text-sub);">Join our community of precision seekers</p>
            </div>

            <!-- Google Signup -->
            <button onclick="handleGoogleSignup()" class="btn-google w-full py-3 rounded-xl flex items-center justify-center space-x-3 text-sm font-bold shadow-sm mb-6">
                <svg width="18" height="18" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
                <span>Continue with Google</span>
            </button>

            <!-- Divider -->
            <div class="flex items-center mb-6">
                <div class="flex-grow border-t border-white/10"></div>
                <span class="px-3 text-[10px] font-bold tracking-widest text-slate-500 uppercase">OR</span>
                <div class="flex-grow border-t border-white/10"></div>
            </div>

            <!-- Signup Form -->
            <form id="signupForm" onsubmit="handleSignup(event)" novalidate>
                <div class="flex flex-col gap-4">

                    <!-- Username -->
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-indigo-400 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </div>
                        <input type="text" id="username" required placeholder="Username"
                            class="input-field w-full pl-12 pr-4 py-3 rounded-xl text-sm font-medium">
                    </div>

                    <!-- Password -->
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-indigo-400 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <input type="password" id="password" required placeholder="Password"
                            class="input-field w-full pl-12 pr-4 py-3 rounded-xl text-sm font-medium">
                    </div>

                    <!-- Confirm Password -->
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-indigo-400 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                            </svg>
                        </div>
                        <input type="password" id="confirmPassword" required placeholder="Confirm Password"
                            class="input-field w-full pl-12 pr-4 py-3 rounded-xl text-sm font-medium">
                    </div>
                </div>

                <!-- Terms -->
                <div class="flex items-center text-xs font-medium px-1 mt-4">
                    <label class="flex items-center space-x-2 cursor-pointer opacity-70 hover:opacity-100 transition-opacity">
                        <input type="checkbox" id="termsCheck" required class="w-4 h-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500 bg-transparent">
                        <span>I agree to the <a href="#" class="text-indigo-400 hover:underline">Terms & Conditions</a></span>
                    </label>
                </div>

                <!-- Submit -->
                <button type="submit" id="submitBtn" class="btn-primary w-full py-3 rounded-xl text-white font-bold text-sm tracking-wide mt-6">
                    Create Account
                </button>
            </form>

            <p class="text-center mt-6 text-xs font-medium opacity-60">
                Already have an account? <a href="login.html" class="text-indigo-400 font-bold hover:underline">Login</a>
            </p>
        </div>
    </main>

    <footer class="py-12 text-center relative z-10 opacity-50">
        <p class="text-[10px] font-bold tracking-[0.3em] uppercase">
            &copy; 2024 Quantity Measurement App &bull; Secure Onboarding
        </p>
    </footer>

    <script>
        const BASE_URL = "https://demoquantity-1.onrender.com";
    
        // ─── THEME TOGGLE ─────────────────────────
        document.getElementById('themeToggle').addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            document.getElementById('sunIcon').classList.toggle('hidden', !isLight);
            document.getElementById('moonIcon').classList.toggle('hidden', isLight);
        });
    
        // ─── TOAST ────────────────────────────────
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `show ${type}`;
            setTimeout(() => toast.className = '', 3500);
        }
    
        // ─── ERROR UI ─────────────────────────────
        function setError(id, state) {
            const el = document.getElementById(id);
            state ? el.classList.add('error') : el.classList.remove('error');
        }
    
        // ─── SIGNUP ───────────────────────────────
        async function handleSignup(event) {
            event.preventDefault();
    
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('termsCheck').checked;
    
            let valid = true;
    
            // Validation
            if (!username) {
                setError('username', true);
                valid = false;
            } else setError('username', false);
    
            if (!password || password.length < 6) {
                setError('password', true);
                showToast('Password must be at least 6 characters', 'error');
                valid = false;
            } else setError('password', false);
    
            if (password !== confirmPassword) {
                setError('confirmPassword', true);
                showToast('Passwords do not match', 'error');
                valid = false;
            } else setError('confirmPassword', false);
    
            if (!terms) {
                showToast('Accept Terms & Conditions', 'error');
                valid = false;
            }
    
            if (!valid) return;
    
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = "Creating Account...";
    
            try {
                const res = await fetch(`${BASE_URL}/auth/signup`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });
    
                let data = null;
                try {
                    data = await res.json();
                } catch (_) {}
    
                if (!res.ok) {
                    let msg = "Signup failed";
    
                    if (data?.message) msg = data.message;
                    else if (data?.error) msg = data.error;
                    else if (Array.isArray(data?.errors)) msg = data.errors.join(", ");
    
                    throw new Error(msg);
                }
    
                showToast("Account created successfully!", "success");
    
                setTimeout(() => {
                    window.location.href = "login.html";
                }, 1500);
    
            } catch (err) {
                console.error("[Signup Error]", err);
                showToast(err.message, "error");
            } finally {
                btn.disabled = false;
                btn.textContent = "Create Account";
            }
        }
    
        // ─── GOOGLE OAUTH ─────────────────────────
        function handleGoogleSignup() {
            window.location.href = `${BASE_URL}/oauth2/authorization/google`;
        }
    </script>
</body>
</html>
